services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: sdp
      MARIADB_USER: sdp
      MARIADB_PASSWORD: sdp
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:php8.3-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: sdp
      WORDPRESS_DB_USER: sdp
      WORDPRESS_DB_PASSWORD: sdp
      WORDPRESS_DEBUG: 1
    volumes:
      - wp_core:/var/www/html
      - ./theme:/var/www/html/wp-content/themes/sdp-starter

  cli:
    image: wordpress:cli-php8.3
    depends_on:
      db:
        condition: service_healthy
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: sdp
      WORDPRESS_DB_USER: sdp
      WORDPRESS_DB_PASSWORD: sdp
    volumes:
      - wp_core:/var/www/html
      - ./theme:/var/www/html/wp-content/themes/sdp-starter
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  db_data:
  wp_core:
